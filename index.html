<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowAI - Automatiza todo con IA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-title">FLOWAI</div>
    
    <nav class="navbar glass">
        <div class="nav-brand">
            <img src="assets/logo.png" alt="FlowAI Logo" class="brand-logo">
        </div>
        <div class="nav-links">
            <a href="#" class="nav-link">Inicio</a>
            <a href="#" class="nav-link">Productos</a>
            <a href="#" class="nav-link">Servicios</a>
            <a href="#" class="nav-link">Contacto</a>
        </div>
        <!-- Mobile Menu Toggle -->
        <button class="mobile-menu-btn">☰</button>
    </nav>

    <main class="hero">
        <canvas id="particle-canvas" class="particle-canvas"></canvas>
        
        <div class="hero-text fade-in-up">
            <h1 class="main-title">Automatiza todo con <span class="text-gradient">IA</span></h1>
            <p class="subtitle">Crea flujos inteligentes que trabajan por ti.</p>
            <div class="hero-actions" style="margin-top: 2rem;">
                <a href="#" class="btn-primary glow-effect">CREAR FLUJO AHORA</a>
            </div>
        </div>

        <div class="hero-image-container fade-in-up delay-1" id="laptop-img-wrapper">
            <div class="image-glow-bg"></div>
            <!-- Posición ligeramente a la derecha -->
            <img src="assets/laptop.png" alt="Futuristic FlowAI Dashboard" class="main-laptop-img" id="laptop-img">
            
            <!-- Overlay animé over the screen area -->
            <div id="dashboard-overlay">
                <div class="data-pulse" style="top: 30%; left: 25%; background: var(--accent-blue); box-shadow: 0 0 20px var(--accent-blue);"></div>
                <div class="data-pulse delay-1" style="top: 55%; left: 45%; background: var(--accent-purple); box-shadow: 0 0 25px var(--accent-purple);"></div>
                <div class="data-pulse delay-2" style="top: 40%; left: 75%; background: var(--accent-green); box-shadow: 0 0 20px var(--accent-green);"></div>
                
                <svg width="100%" height="100%" class="overlay-svg">
                    <defs>
                        <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00bfff" stop-opacity="0" />
                            <stop offset="50%" stop-color="#8a2be2" stop-opacity="0.8" />
                            <stop offset="100%" stop-color="#00ffcc" stop-opacity="0" />
                        </linearGradient>
                    </defs>
                    <path class="flow-line-1" d="M 25% 30% Q 35% 55% 45% 55%" fill="none" stroke="url(#flowGrad)" stroke-width="2"/>
                    <path class="flow-line-2" d="M 45% 55% Q 60% 40% 75% 40%" fill="none" stroke="url(#flowGrad)" stroke-width="2"/>
                </svg>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
