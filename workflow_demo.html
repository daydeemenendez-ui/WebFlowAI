<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cinematic Workflow Demo</title>
    <style>
        :root {
            --bg: #010105;
            --brand-blue: #00f0ff;
            --brand-purple: #bd00ff;
            --glass-bg: rgba(20, 20, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(189, 0, 255, 0.1) 0%, transparent 50%);
            overflow: hidden;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            perspective: 1200px;
        }

        /* Ambient particles / grid */
        .grid {
            position: absolute; width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotateX(60deg) translateY(-100px) translateZ(-200px);
            z-index: 0;
            pointer-events: none;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: rotateX(60deg) translateY(60px) translateZ(-200px); }
        }

        #scene {
            position: absolute;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            transform: scale(0.6) rotateX(15deg) rotateY(-15deg) translateZ(-500px);
            z-index: 10;
        }
        .animate #scene {
            animation: cameraPan 8s cubic-bezier(0.25, 1, 0.3, 1) forwards;
        }
        @keyframes cameraPan {
            0% { transform: scale(0.6) rotateX(15deg) rotateY(-15deg) translateZ(-500px); }
            40% { transform: scale(1) rotateX(0deg) rotateY(0deg) translateZ(0px); }
            70% { transform: scale(1.1) rotateX(5deg) rotateY(5deg) translateZ(50px); }
            100% { transform: scale(1.3) rotateX(-5deg) rotateY(-5deg) translateZ(150px); }
        }

        /* SVG For Node Connections */
        svg.connections {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            filter: drop-shadow(0 0 8px rgba(0,240,255,0.6));
        }
        .path-bg { stroke: rgba(255,255,255,0.05); stroke-width: 2; fill: none; }
        .path-flow {
            stroke: url(#cyan-purple); stroke-width: 4; fill: none;
            stroke-linecap: round;
            stroke-dasharray: 1500; stroke-dashoffset: 1500;
        }
        .animate .flow-1 { animation: drawPath 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; animation-delay: 1.5s; }
        .animate .flow-2 { animation: drawPath 1.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; animation-delay: 1.8s; }
        .animate .flow-3 { animation: drawPath 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; animation-delay: 1.6s; }
        @keyframes drawPath { to { stroke-dashoffset: 0; } }

        /* Nodes */
        .node {
            position: absolute; width: 16px; height: 16px; border-radius: 50%;
            background: var(--brand-blue);
            box-shadow: 0 0 20px var(--brand-blue), 0 0 40px var(--brand-blue);
            transform: scale(0);
            z-index: 5;
        }
        .node.purple {
            background: var(--brand-purple);
            box-shadow: 0 0 20px var(--brand-purple), 0 0 40px var(--brand-purple);
        }
        .node.center {
            width: 30px; height: 30px; background: #fff; box-shadow: 0 0 30px #fff; z-index: 15;
            margin-top: -7px; margin-left: -7px;
        }
        .node::after {
            content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px;
            border: 2px solid currentcolor; border-radius: 50%; opacity: 0;
            color: inherit;
        }
        
        #n1 { top: 20%; left: 15%; }
        #n2 { top: 75%; left: 25%; }
        #n3 { top: 30%; left: 85%; }
        #n-center { top: 50%; left: 50%; }

        .animate #n1 { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; animation-delay: 0.5s; }
        .animate #n2 { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; animation-delay: 0.7s; }
        .animate #n3 { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; animation-delay: 0.9s; }
        .animate #n-center { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; animation-delay: 1.2s; }
        
        .animate #n1::after { color: var(--brand-blue); animation: ping 2s infinite ease-out; animation-delay: 1s; }
        .animate #n2::after { color: var(--brand-purple); animation: ping 2s infinite ease-out; animation-delay: 1.2s; }
        .animate #n3::after { color: var(--brand-blue); animation: ping 2s infinite ease-out; animation-delay: 1.4s; }
        .animate #n-center::after { color: #fff; animation: ping 2s infinite ease-out; animation-delay: 1.7s; }

        @keyframes popIn { to { transform: scale(1); } }
        @keyframes ping {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Main UI Screen Component */
        .dash-screen {
            position: absolute; top: 50%; left: 50%;
            width: 700px; height: 450px;
            margin-top: -225px; margin-left: -350px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--card-shadow), inset 0 0 0 1px rgba(255,255,255,0.05);
            z-index: 30;
            display: flex; flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(80px) scale(0.95) rotateX(15deg);
        }
        .animate .dash-screen {
            animation: dashEnter 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 3.2s;
        }
        @keyframes dashEnter {
            to { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); }
        }

        .dash-header {
            height: 48px; border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; padding: 0 20px; gap: 8px;
            background: rgba(0,0,0,0.2);
        }
        .mac-dot { width: 12px; height: 12px; border-radius: 50%; }
        .mac-dot.r { background: #ff5f56; } .mac-dot.y { background: #ffbd2e; } .mac-dot.g { background: #27c93f; }
        
        .dash-body {
            flex: 1; padding: 30px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 24px;
        }

        .chart-box {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: 12px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
        }
        .chart-box::before {
            content:''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(0,240,255,0.05), transparent);
        }

        .sk-line { height: 12px; border-radius: 6px; background: rgba(255,255,255,0.1); margin-bottom: 16px; overflow: hidden; position: relative; z-index: 2; }
        .sk-line::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }
        .animate .sk-line::after {
            animation: skFlow 1.5s infinite ease-in-out;
        }
        @keyframes skFlow { 100% { left: 200%; } }

        .stat-ring {
            width: 100px; height: 100px; border-radius: 50%;
            border: 8px solid rgba(255,255,255,0.05);
            margin: auto; position: relative; z-index: 2;
        }
        .stat-ring::before {
            content: ''; position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px;
            border-radius: 50%; border: 8px solid var(--brand-purple);
            border-top-color: transparent; border-right-color: transparent;
            transform: rotate(-45deg); opacity: 0;
        }
        .animate .stat-ring::before {
            animation: statFill 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 4.5s;
        }
        @keyframes statFill {
            0% { transform: rotate(-45deg); opacity: 1; }
            100% { transform: rotate(135deg); opacity: 1; border-color: var(--brand-purple); }
        }

        .widget {
            position: absolute; top: 15%; right: 10%;
            width: 250px; padding: 20px;
            background: rgba(0, 240, 255, 0.05);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 16px;
            z-index: 40; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            opacity: 0; transform: translateX(50px) translateZ(100px);
        }
        .animate .widget {
            animation: widgetEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 5s;
        }
        @keyframes widgetEnter {
            to { opacity: 1; transform: translateX(0) translateZ(100px); }
        }

        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0, 240, 255, 0.1); padding: 6px 12px; border-radius: 30px;
            border: 1px solid rgba(0,240,255,0.3);
            color: var(--brand-blue); font-size: 12px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-dot { width: 8px; height: 8px; background: var(--brand-blue); border-radius: 50%; box-shadow: 0 0 10px var(--brand-blue); }
        .animate .status-dot { animation: blink 1s infinite alternate; }
        @keyframes blink { to { opacity: 0.3; } }

        .sync-text {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            font-size: 14px; color: #fff; letter-spacing: 4px; text-transform: uppercase;
            opacity: 0; z-index: 50;
        }
        .animate .sync-text {
            animation: syncGlow 3s ease-in-out forwards;
            animation-delay: 2s;
        }
        @keyframes syncGlow {
            0% { opacity: 0; filter: blur(5px); }
            20% { opacity: 1; filter: blur(0px); text-shadow: 0 0 20px rgba(255,255,255,0.8); }
            80% { opacity: 1; filter: blur(0px); text-shadow: 0 0 20px rgba(255,255,255,0.8); }
            100% { opacity: 0; filter: blur(10px); }
        }

        .impact {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #fff, transparent);
            mix-blend-mode: overlay; opacity: 0; z-index: 999; pointer-events: none;
        }
        .animate .impact {
            animation: impactFlash 0.8s ease-out forwards; animation-delay: 6s;
        }
        @keyframes impactFlash {
            0% { opacity: 0; transform: scale(0.8); }
            20% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(2); }
        }
        
        #start-overlay {
            position: absolute; inset: 0; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: white;
            font-size: 24px; letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div id="start-overlay">CLICK TO START RECORDING</div>

<div class="grid"></div>

<div id="scene">
    <div class="sync-text">SYSTEM ALIGNMENT IN PROGRESS</div>

    <svg class="connections" id="svg-layer">
        <defs>
            <linearGradient id="cyan-purple" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00f0ff" />
                <stop offset="100%" stop-color="#bd00ff" />
            </linearGradient>
        </defs>
    </svg>

    <!-- Nodes -->
    <div class="node" id="n1"></div>
    <div class="node purple" id="n2"></div>
    <div class="node" id="n3"></div>
    <div class="node center" id="n-center"></div>

    <!-- Main UI Screen -->
    <div class="dash-screen">
        <div class="dash-header">
            <div class="mac-dot r"></div><div class="mac-dot y"></div><div class="mac-dot g"></div>
        </div>
        <div class="dash-body">
            <div class="chart-box">
                <div class="sk-line" style="width: 80%"></div>
                <div class="sk-line" style="width: 60%"></div>
                <div class="sk-line" style="width: 90%"></div>
                <div class="sk-line" style="width: 40%"></div>
            </div>
            <div class="chart-box">
                <div class="stat-ring"></div>
                <div style="text-align: center; margin-top: 30px;">
                    <div class="sk-line" style="width: 40%; margin: 0 auto 10px;"></div>
                    <div class="sk-line" style="width: 20%; margin: 0 auto; background: rgba(189,0,255,0.4)"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Widget -->
    <div class="widget">
        <div class="status-badge"><div class="status-dot"></div> DATA SYNCED</div>
        <div style="margin-top: 20px;">
            <div class="sk-line" style="height: 6px; width: 100%"></div>
            <div class="sk-line" style="height: 6px; width: 70%"></div>
        </div>
    </div>
</div>

<div class="impact"></div>

<script>
    window.onload = () => {
        const svg = document.getElementById('svg-layer');

        const createPath = (x1, y1, x2, y2, c1x, c1y, animClass) => {
            const d = `M ${x1} ${y1} Q ${c1x} ${c1y} ${x2} ${y2}`;
            
            const bg = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            bg.setAttribute('d', d);
            bg.setAttribute('class', 'path-bg');
            svg.appendChild(bg);

            const flow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            flow.setAttribute('d', d);
            flow.setAttribute('class', `path-flow ${animClass}`);
            svg.appendChild(flow);
        };

        const w = window.innerWidth;
        const h = window.innerHeight;

        createPath(w*0.15 + 8, h*0.20 + 8, w*0.5, h*0.5, w*0.3, h*0.35, 'flow-1');
        createPath(w*0.25 + 8, h*0.75 + 8, w*0.5, h*0.5, w*0.35, h*0.6, 'flow-2');
        createPath(w*0.85 + 8, h*0.30 + 8, w*0.5, h*0.5, w*0.7, h*0.4, 'flow-3');

        document.getElementById('start-overlay').addEventListener('click', function() {
            this.style.opacity = '0';
            setTimeout(() => this.style.display = 'none', 500);
            
            // Wait a tiny bit then start
            setTimeout(() => {
                document.body.classList.add('animate');
            }, 100);
        });
    };
</script>
</body>
</html>
